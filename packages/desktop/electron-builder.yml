appId: com.threadverse.app
productName: ThreadVerse

directories:
  output: dist

publish:
  provider: github
  owner: anu-xo
  repo: Final-Thread
  releaseType: release

win:
  target: nsis
  signingHashAlgorithms:
    - sha256
  # certificateFile / certificatePassword are read from WIN_CSC_LINK / WIN_CSC_KEY_PASSWORD env vars.
  # For EV / cloud-HSM signing, uncomment and point to a signing callback script:
  # sign: build/sign-ev.cmd

mac:
  target: dmg
  entitlements: build/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  extraResources:
    - from: ../web/dist
      to: web/dist

mas:
  target: mas
  entitlements: build/entitlements.mas.plist
  entitlementsInherit: build/entitlements.mas.inherit.plist
  hardenedRuntime: false
  extraResources:
    - from: ../web/dist
      to: web/dist

linux:
  target: AppImage
