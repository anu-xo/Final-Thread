appId: com.threadverse.app
productName: ThreadVerse

directories:
  output: dist

publish:
  provider: github
  owner: anu-xo
  repo: Final-Thread
  releaseType: release

win:
  target:
    - target: nsis
      arch:
        - x64
  signingHashAlgorithms:
    - sha256
  # certificateFile / certificatePassword are read from WIN_CSC_LINK / WIN_CSC_KEY_PASSWORD env vars.
  # For EV / cloud-HSM signing, set the sign callback:
  # sign: build/sign-ev.cmd
  signAndEditExecutable: true

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  entitlements: build/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false  # handled separately in CI via xcrun notarytool
  extendInfo:
    CFBundleURLTypes:
      - CFBundleURLSchemes:
          - threadverse
        CFBundleURLName: com.threadverse.app
        CFBundleURLIcon: AppIcon
  extraResources:
    - from: ../web/dist
      to: web/dist

mas:
  target: mas
  bundleId: com.threadverse.app
  entitlements: build/entitlements.mas.plist
  entitlementsInherit: build/entitlements.mas.inherit.plist
  hardenedRuntime: false
  # MAS requires app sandbox — no hardened runtime
  # provisioningProfile is provided via CSC_LINK / CSC_KEY_PASSWORD env vars
  extraResources:
    - from: ../web/dist
      to: web/dist

linux:
  target:
    - target: AppImage
      arch:
        - x64
