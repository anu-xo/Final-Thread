<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://res.cloudinary.com; connect-src 'self' https://api.cloudinary.com https://api.threadverse.app wss://api.threadverse.app; font-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" />
    <title>ThreadVerse - Community Platform</title>
    <meta name="description" content="A modern community platform built with the MERN stack. Create communities, share posts, and connect in real-time." />
    <script>
      (function () {
        var theme;
        try {
          if (window.electronAPI && window.electronAPI.getThemeSync) {
            theme = window.electronAPI.getThemeSync();
          }
        } catch (_) {}
        if (!theme) {
          theme = localStorage.getItem('threadverse-theme') || 'light';
          if (theme === 'system') {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
        }
        if (theme === 'dark') document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="splash" style="min-height:100vh;background:#f9fafb;display:flex;flex-direction:column;font-family:system-ui,-apple-system,sans-serif">
      <header style="height:56px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;padding:0 16px">
        <span style="font-weight:700;color:#f97316;font-size:18px">&#9889; ThreadVerse</span>
      </header>
      <main style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;text-align:center">
        <h1 style="font-size:clamp(2.25rem,5vw,3rem);font-weight:800;color:#111827;letter-spacing:-0.025em">ThreadVerse</h1>
        <p style="margin-top:16px;max-width:576px;font-size:18px;color:#4b5563">A modern community platform built with the MERN stack. Create communities, share posts, and connect in real-time.</p>
        <div style="margin-top:32px;display:flex;gap:12px">
          <a href="/register" style="padding:12px 24px;font-size:14px;font-weight:600;background:#f97316;color:#fff;border-radius:9999px;text-decoration:none">Get Started</a>
          <a href="/login" style="padding:12px 24px;font-size:14px;font-weight:600;border:1px solid #d1d5db;color:#374151;border-radius:9999px;text-decoration:none">Log In</a>
        </div>
      </main>
      <footer style="border-top:1px solid #e5e7eb;padding:24px;text-align:center;font-size:12px;color:#9ca3af">ThreadVerse &mdash; Built with the MERN stack</footer>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
