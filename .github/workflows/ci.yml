name: CI

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, staging]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    # Keep these! Your backend needs them for integration tests
    services:
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password123
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3  # Updated to v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'            # Optimizes speeds by caching pnpm modules

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (web)
        run: pnpm --filter web exec eslint src --ext .js,.jsx || true

      - name: Test (server)
        env:
          MONGODB_URI: mongodb://admin:password123@localhost:27017/threadverse_test?authSource=admin
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test_secret
          JWT_REFRESH_SECRET: test_refresh_secret
          NODE_ENV: test
        run: pnpm --filter server test

      - name: Build applications
        run: pnpm --filter web build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Font rendering audit
        run: |
          pnpm exec playwright test \
            e2e/tests/font-rendering.spec.js \
            --project=web \
            --reporter=list

      - name: Upload font audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: font-audit-ci
          path: test-results/
          retention-days: 14

      - name: Titlebar/tray audit
        run: |
          pnpm exec playwright test \
            e2e/tests/titlebar-tray-audit.spec.js \
            --project=titlebar-tray-audit \
            --reporter=list

      - name: Upload titlebar/tray audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: titlebar-tray-audit-ci
          path: test-results/
          retention-days: 14