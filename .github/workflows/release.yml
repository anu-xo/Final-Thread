name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # ── Platform dependencies ────────────────────────────────────────────

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev libusb-1.0-0 rpm

      # ── Code-signing certificates (must be imported BEFORE build) ────────

      - name: Import macOS code-signing certificate
        if: runner.os == 'macOS'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Decode Windows code-signing certificate
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pfxBytes = [Convert]::FromBase64String("${{ secrets.WIN_CERTIFICATE }}")
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\certificate.pfx", $pfxBytes)
          echo "WIN_CSC_LINK=$env:RUNNER_TEMP\certificate.pfx" >> $env:GITHUB_ENV

      # ── Build ───────────────────────────────────────────────────────────

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter web build

      - name: Build Electron app (DMG)
        run: pnpm --filter desktop exec electron-builder --publish never --mac dmg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}

      - name: Build Electron app (MAS)
        if: runner.os == 'macOS'
        run: pnpm --filter desktop exec electron-builder --publish never --mac mas
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build Electron app (Windows)
        if: runner.os == 'Windows'
        run: pnpm --filter desktop exec electron-builder --publish never --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
          # For EV / cloud-HSM signing, set the sign callback:
          # CSC_LINK: ""  # not used for EV
          # SIGN_CMD: build/sign-ev.cmd

      # ── Verify signing ──────────────────────────────────────────────────

      - name: Verify macOS DMG code signature
        if: runner.os == 'macOS'
        run: |
          DMG_PATH=$(find dist -name "*.dmg" -maxdepth 1 | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "No .dmg found, skipping signature verification"
            exit 0
          fi

          echo "=== Verifying DMG signature ==="
          codesign --verify --deep --strict "$DMG_PATH" && echo "DMG signature: VALID" || echo "DMG signature: INVALID"

      - name: Verify MAS build codesign (strict)
        if: runner.os == 'macOS'
        run: |
          MAS_PATH=$(find dist -name "*.pkg" -o -name "*mas*" -maxdepth 2 | head -1)
          if [ -z "$MAS_PATH" ]; then
            echo "No MAS artifact found, skipping"
            exit 0
          fi

          echo "=== MAS artifact: $MAS_PATH ==="
          echo "=== codesign --verify --deep --strict ==="
          codesign --verify --deep --strict "$MAS_PATH" && echo "MAS signature: VALID" || {
            echo "MAS signature verification failed"
            exit 1
          }

      - name: Verify Windows code signature
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { Write-Host "No .exe found, skipping"; exit 0 }

          $sig = Get-AuthenticodeSignature $exe.FullName
          Write-Host "Status: $($sig.Status)"
          Write-Host "Signer: $($sig.SignerCertificate.Subject)"
          Write-Host "Thumbprint: $($sig.SignerCertificate.Thumbprint)"

          if ($sig.Status -ne "Valid") {
            Write-Error "Signature is NOT valid — signing may have failed"
            exit 1
          }

          # SmartScreen note: a brand-new EV certificate triggers SmartScreen
          # warnings for 1-7 days while Microsoft builds reputation for the cert.
          # This is expected and NOT a pipeline bug. Once reputation is established,
          # EV-signed binaries pass SmartScreen without warnings.

      # ── Notarize + staple (macOS only, must happen before publish) ──────

      - name: Notarize macOS DMG
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_PATH=$(find dist -name "*.dmg" -maxdepth 1 | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "No .dmg found, skipping notarization"
            exit 0
          fi

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"

      - name: Verify macOS notarization
        if: runner.os == 'macOS'
        run: |
          DMG_PATH=$(find dist -name "*.dmg" -maxdepth 1 | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "No .dmg found, skipping verification"
            exit 0
          fi

          hdiutil attach "$DMG_PATH" -nobrowse
          APP_PATH=$(find /Volumes -name "ThreadVerse.app" -maxdepth 2 | head -1)
          spctl --assess --verbose "$APP_PATH"
          hdiutil detach /Volumes/ThreadVerse*

      # ── Publish (only after all signing/verification passes) ────────────

      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" --title "Release $TAG" --generate-notes || true
          for f in dist/*; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber
          done
